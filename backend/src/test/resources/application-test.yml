spring:
  datasource:
    url: ${TEST_DB_URL:jdbc:postgresql://localhost:5432/socialmedia_test}
    username: ${TEST_DB_USER:postgres}
    password: ${TEST_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  session:
    store-type: none

  data:
    redis:
      host: ${TEST_REDIS_HOST:localhost}
      port: ${TEST_REDIS_PORT:6379}
      password: ${TEST_REDIS_PASSWORD:}
      ssl:
        enabled: ${TEST_REDIS_SSL:false}
      repositories:
        enabled: false

  kafka:
    bootstrap-servers: ${TEST_KAFKA_SERVERS:localhost:9092}
    properties:
      sasl.mechanism: ${TEST_KAFKA_SASL_MECHANISM:PLAIN}
      security.protocol: ${TEST_KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      sasl.jaas.config: ${TEST_KAFKA_JAAS_CONFIG:}
    producer:
      retries: 0
    consumer:
      auto-offset-reset: earliest
      group-id: social-media-test-group
    listener:
      type: single

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-client-id
            client-secret: test-client-secret

jwt:
  secret: ${TEST_JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: 3600000
  refresh-expiration: 86400000

aws:
  s3:
    bucket-name: test-bucket
    region: us-east-1
    access-key: test-access-key
    secret-key: test-secret-key

logging:
  level:
    com.socialmedia.platform: DEBUG
    org.springframework.security: INFO

server:
  port: 10000
