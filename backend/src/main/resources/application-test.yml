spring:
  datasource:
    url: jdbc:tc:postgresql:15:///socialmedia # This triggers Testcontainers Automatically
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  
  # Disable Redis Session for Tests
  session:
    store-type: none 

  data:
    redis:
      repositories:
        enabled: false # Don't try to connect to Redis for repositories

  # Kafka Test Configuration
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      retries: 0
    consumer:
      auto-offset-reset: earliest
    listener:
      type: single

  # OAuth2 Dummy Values for Testing
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-client-id
            client-secret: test-client-secret

# Test JWT Configuration
jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration: 3600000 # 1 hour
  refresh-expiration: 86400000 # 24 hours

# Mock AWS
aws:
  s3:
    bucket-name: test-bucket
    region: us-east-1
    access-key: test-access-key
    secret-key: test-secret-key

logging:
  level:
    com.socialmedia.platform: DEBUG
    org.springframework.security: INFO
